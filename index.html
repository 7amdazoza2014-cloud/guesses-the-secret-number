<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guess the Number</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-X8M2ZLCKNX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());
  gtag("config", "G-X8M2ZLCKNX");
</script>

<!-- GameMonetize SDK -->
<script src="https://api.gamemonetize.com/sdk.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    sdk.init({
        gameId: "3jaej17a8dokfme9v2fjj3nhn13q2u3z"
    });
});

function showAd() {
    sdk.showRewardedAd(function(success) {
        console.log("Ad watched:", success);
    });
}
</script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: url("ed.jpg") no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
    }
    .box {
        background: rgba(0,0,0,0.6);
        padding: 25px;
        border-radius: 12px;
        width: 90%;
        max-width: 380px;
        text-align: center;
    }
    h1 {
        margin-top: 0;
        font-size: 32px;
        font-weight: bold;
        color: #3b82f6;
        text-shadow: 0 0 10px #3b82f6;
    }
    input, button {
        padding: 10px;
        border-radius: 8px;
        border: none;
        margin: 6px 0;
        width: 100%;
        font-size: 16px;
    }
    input {
        background: #111827;
        color: white;
        border: 1px solid #4b5563;
    }
    button {
        background: #3b82f6;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }
    button:hover {
        background: #2563eb;
    }
    .green { background: #10b981 !important; }
    .yellow { background: #facc15 !important; color: black !important; }
    .message { min-height: 24px; margin-top: 10px; }
</style>
</head>

<body>

<div class="box">

<h1>Guess the Number</h1>

<div style="background:#111827; padding:10px; border-radius:8px; text-align:left;">
    <strong>Money Rewards:</strong>
    <ul style="margin:8px 0 0 15px;">
        <li>1 attempt = $50</li>
        <li>2 attempts = $40</li>
        <li>3 attempts = $30</li>
        <li>4 attempts = $20</li>
        <li>5 attempts = $10</li>
        <li>6+ attempts = $5</li>
    </ul>
</div>

<div id="modeSelect">
    <p>Select Game Mode</p>
    <button onclick="chooseMode(1)">1 Player</button>
    <button onclick="chooseMode(2)">2 Players</button>
</div>

<div id="login" style="display:none;">
    <p>Player 1 Name:</p>
    <input id="p1">
    <p>Player 2 Name:</p>
    <input id="p2">
    <button onclick="start2P()">Start</button>
</div>

<div id="game" style="display:none;">
    <p id="turn"></p>
    <p>Guess a number between 1 and 100</p>

    <input id="guess" type="number" min="1" max="100">
    <button onclick="guessNumber()">Guess</button>

    <button class="green" onclick="buyHint()">Buy Hint ($25)</button>

    <div class="message" id="msg"></div>

    <p id="attempts"></p>
    <p id="money"></p>

    <button class="yellow" id="again" style="display:none;" onclick="resetGame()">Play Again</button>
</div>

</div>

<script>
let mode = 1;
let players = [];
let turn = 0;

let secret = { p1: 0, p2: 0 };
let attempts = { p1: 0, p2: 0 };
let money = { p1: 0, p2: 0 };

if (localStorage.money_p1) money.p1 = Number(localStorage.money_p1);
if (localStorage.money_p2) money.p2 = Number(localStorage.money_p2);

function saveMoney() {
    localStorage.money_p1 = money.p1;
    localStorage.money_p2 = money.p2;
}

function reward(attempts) {
    return Math.max(5, 60 - attempts * 10);
}

function chooseMode(m) {
    mode = m;
    document.getElementById("modeSelect").style.display = "none";

    if (m === 1) start1P();
    else document.getElementById("login").style.display = "block";
}

function start1P() {
    players = ["Player"];
    secret.p1 = Math.floor(Math.random() * 100) + 1;

    document.getElementById("game").style.display = "block";
    document.getElementById("turn").textContent = "Your turn";
    updateMoney();
}

function start2P() {
    let p1 = document.getElementById("p1").value.trim();
    let p2 = document.getElementById("p2").value.trim();

    if (!p1 || !p2) return alert("Enter both names");

    players = [p1, p2];
    secret.p1 = Math.floor(Math.random() * 100) + 1;
    secret.p2 = Math.floor(Math.random() * 100) + 1;

    document.getElementById("login").style.display = "none";
    document.getElementById("game").style.display = "block";

    updateTurn();
    updateMoney();
}

function updateTurn() {
    document.getElementById("turn").textContent = players[turn] + "'s turn";
}

function updateMoney() {
    if (mode === 1) {
        document.getElementById("money").textContent = "Money: $" + money.p1;
    } else {
        document.getElementById("money").textContent =
            players[0] + ": $" + money.p1 + " | " +
            players[1] + ": $" + money.p2;
    }
}

function buyHint() {
    let current = turn === 0 ? "p1" : "p2";

    if (money[current] < 25) {
        msg.textContent = "Not enough money!";
        return;
    }

    money[current] -= 25;
    saveMoney();
    updateMoney();

    let n = secret[current];
    msg.textContent = `Hint: Between ${n - 5} and ${n + 5}`;
}

function guessNumber() {
    let g = Number(document.getElementById("guess").value);
    let msg = document.getElementById("msg");

    if (!g || g < 1 || g > 100) {
        msg.textContent = "Enter a number between 1–100";
        return;
    }

    let current = turn === 0 ? "p1" : "p2";
    attempts[current]++;

    if (g === secret[current]) {
        let r = reward(attempts[current]);
        money[current] += r;
        saveMoney();

        msg.textContent = players[turn] + " wins! Earned $" + r;

        showAd();

        document.getElementById("again").style.display = "block";
        updateMoney();
        return;
    }

    msg.textContent = g < secret[current]
        ? "Higher!"
        : "Lower!";

    if (mode === 2) {
        turn = turn === 0 ? 1 : 0;
        updateTurn();
    }
}

function resetGame() {
    attempts = { p1: 0, p2: 0 };
    secret.p1 = Math.floor(Math.random() * 100) + 1;
    secret.p2 = Math.floor(Math.random() * 100) + 1;

    turn = 0;

    msg.textContent = "";
    document.getElementById("again").style.display = "none";

    updateTurn();
}
</script>

</body>
</html>
